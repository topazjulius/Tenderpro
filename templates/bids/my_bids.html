{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">

<h2>My Submitted Bids</h2>

<table class="table table-bordered">
<thead>
<tr>
<th>Tender</th>
<th>Amount</th>
<th>Date</th>
</tr>
</thead>

<tbody>
{% for bid in bids %}
<tr>
<td>{{ bid.tender.title }}</td>
<td>{{ bid.amount }}</td>
<td>{{ bid.created_at }}</td>
</tr>
{% empty %}
<tr>
<td colspan="3">No bids submitted yet.</td>
</tr>
{% endfor %}
</tbody>
</table>

</div>
{% endblock %}
